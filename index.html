<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quebra Cabeça</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/quebra-cabeca.css"/>
</head>
<body>
    <section class="resultado-modal hide" id="resultado-modal">
        <div class="resultado-container" id="resultado"></div>
    </section>
    <header>
        <div class="header-container">
            <input type="file" class="uploader" id="uploader" name="uploader" accept="image/png" />
            <h1 class="title" >Quebra-Cabeça</h1>
            <select class="nivel" name="nivel" id="nivel">
                <option value="0">Fácil</option>
                <option value="1" selected>Médio</option>
                <option value="2">Difícil</option>
            </select>
        </div>
    </header>
    <section class="container">
        <div id="mensagem"></div>
        <div class="tabuleiro" id="tabuleiro">
        </div>
        <div class="baralho" id="baralho">
            <div class="loader"></div>
        </div>
    </section>
    <footer>
        <p>&copy; Quebra-Cabeça</p>
        <p>
            Desenvolvido por: 
            <a href="https://github.com/rafatavares03" target="_blank" rel="noopener noreferrer">@rafatavares03</a>, 
            <a href="https://github.com/hugosouza1" target="_blank" rel="noopener noreferrer">@hugosouza1</a> e 
            <a href="https://github.com/GuilhermeFornaciari" target="_blank" rel="noopener noreferrer">@GuilhermeFornaciari</a>
        </p>
    </footer>
    <script src="./js/script.js"></script>
</body>
</html>
